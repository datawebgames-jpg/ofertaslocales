<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cargando… — OfertasLocales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../src/styles.css" />
</head>
<body>
  <header>
    <a href="../../index.html" class="logo">Ofertas<span>Locales</span></a>
    <div class="header-location">📍 <strong>Tu ciudad</strong></div>
    <form class="search-form" onsubmit="buscar(event)">
      <input class="search-input" type="text" id="searchInput" placeholder="Buscar en este comercio…" />
      <button class="search-btn" type="submit">🔍</button>
    </form>
  </header>
  <nav class="nav-cats" id="navCats"></nav>
  <div class="main-layout">
    <aside class="sidebar">
      <p class="sidebar-title">Filtrar por</p>
      <div class="filter-group">
        <p class="filter-group-title">Precio</p>
        <div class="price-range">
          <input class="price-input" type="number" id="precioMin" placeholder="Mínimo $" />
          <input class="price-input" type="number" id="precioMax" placeholder="Máximo $" />
          <button class="price-btn" onclick="filtrarPrecio()">Aplicar</button>
        </div>
      </div>
      <div class="filter-group">
        <p class="filter-group-title">Descuento</p>
        <button class="filter-option" id="dsc20" onclick="toggleDescuento(20)">Más del 20% OFF</button>
        <button class="filter-option" id="dsc30" onclick="toggleDescuento(30)">Más del 30% OFF</button>
        <button class="filter-option" id="dsc40" onclick="toggleDescuento(40)">Más del 40% OFF</button>
      </div>
    </aside>
    <div class="content">
      <div class="comercio-banner" id="banner"></div>
      <div class="mobile-filter-bar" id="mobileFilterBar"></div>
      <div class="results-header">
        <p class="results-count"><strong id="resultsCount">0</strong> ofertas</p>
        <select class="sort-select" id="sortSelect" onchange="renderOfertas()">
          <option value="relevancia">Más relevantes</option>
          <option value="precio-asc">Menor precio</option>
          <option value="precio-desc">Mayor precio</option>
          <option value="descuento">Mayor descuento</option>
        </select>
      </div>
      <div class="ofertas-grid" id="ofertasGrid"></div>
    </div>
  </div>
  <footer><p>&copy; 2025 OfertasLocales — Conectando comercios locales con su comunidad</p></footer>
  <script type="module">
    import { getComercio } from '../../src/store.js';
    import { buildNav, buildMobileDescuentoChips, RUBROS_ICONO, pct, fmt } from '../../src/layout.js';
    const COMERCIO_ID = 5;
    const c = getComercio(COMERCIO_ID);
    document.title = `${c.nombre} — OfertasLocales`;
    buildNav(document.getElementById('navCats'), [c.rubro], { mode: 'navigate', basePath: '../../', activeRubro: c.rubro });
    document.getElementById('banner').style.borderLeftColor = c.color;
    const logoInner = c.logo ? `<img src="${c.logo}" alt="${c.nombre}" style="width:100%;height:100%;object-fit:contain" />` : c.inicial;
    document.getElementById('banner').innerHTML = `
      <div class="banner-logo" style="background:${c.logo ? '#f0f0f0' : c.color}">${logoInner}</div>
      <div class="banner-info">
        <span class="banner-badge" style="background:${c.color}">${c.rubro}</span>
        <div class="banner-nombre">${c.nombre}</div>
        <div class="banner-desc">${c.descripcion}</div>
      </div>
      <a class="banner-link" href="../../index.html">Ver todos los comercios →</a>`;
    let filtroMinPrecio = null, filtroMaxPrecio = null, filtroDescuento = null;
    function onMobileDescuento(min) { filtroDescuento = min; buildMobileDescuentoChips(document.getElementById('mobileFilterBar'), min, onMobileDescuento); renderOfertas(); }
    buildMobileDescuentoChips(document.getElementById('mobileFilterBar'), null, onMobileDescuento);
    window.buscar = (e) => { e.preventDefault(); renderOfertas(); };
    window.filtrarPrecio = () => { filtroMinPrecio = parseFloat(document.getElementById('precioMin').value)||null; filtroMaxPrecio = parseFloat(document.getElementById('precioMax').value)||null; renderOfertas(); };
    window.toggleDescuento = (min) => { filtroDescuento = filtroDescuento===min?null:min; [20,30,40].forEach(n=>document.getElementById(`dsc${n}`)?.classList.toggle('active',filtroDescuento===n)); renderOfertas(); };
    function getOfertas() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      let lista = [...c.ofertas];
      if (filtroMinPrecio) lista = lista.filter(o=>o.precio>=filtroMinPrecio);
      if (filtroMaxPrecio) lista = lista.filter(o=>o.precio<=filtroMaxPrecio);
      if (filtroDescuento) lista = lista.filter(o=>pct(o.precioOriginal,o.precio)>=filtroDescuento);
      if (q) lista = lista.filter(o=>o.titulo.toLowerCase().includes(q)||o.descripcion.toLowerCase().includes(q));
      const sort = document.getElementById('sortSelect').value;
      if (sort==='precio-asc') lista.sort((a,b)=>a.precio-b.precio);
      if (sort==='precio-desc') lista.sort((a,b)=>b.precio-a.precio);
      if (sort==='descuento') lista.sort((a,b)=>pct(b.precioOriginal,b.precio)-pct(a.precioOriginal,a.precio));
      if (sort==='relevancia') lista.sort((a,b)=>(b.destacada?1:0)-(a.destacada?1:0));
      return lista;
    }
    window.renderOfertas = function() {
      const lista=getOfertas(), grid=document.getElementById('ofertasGrid');
      document.getElementById('resultsCount').textContent=lista.length;
      if (!lista.length) { grid.innerHTML=`<div class="empty-state"><div class="icon">🏷️</div><p>${c.ofertas.length===0?'Las ofertas estarán disponibles muy pronto.':'No hay ofertas con esos filtros.'}</p></div>`; return; }
      const icono=RUBROS_ICONO[c.rubro]||'🏷️';
      grid.innerHTML=lista.map(o=>{const off=pct(o.precioOriginal,o.precio);return`<div class="oferta-card" style="cursor:default"><div class="card-imagen">${o.imagen?`<img src="${o.imagen}" alt="${o.titulo}"/>`:`<span class="card-imagen-placeholder">${icono}</span>`}${o.destacada?'<span class="badge-oferta">Destacada</span>':''}</div><div class="card-body"><p class="card-titulo">${o.titulo}</p><p class="card-desc">${o.descripcion}</p><p class="card-precio-original">${fmt(o.precioOriginal)}</p><div class="card-precio-row"><span class="card-precio" style="color:${c.color}">${fmt(o.precio)}</span><span class="card-descuento">${off}% OFF</span></div><p class="card-envio">✓ Disponible en local</p><button class="card-buy-btn" style="background:${c.color}" onclick="openConsulta(${o.id})">🛒 Consultar / Comprar</button></div></div>`;}).join('');
    };
    const WHATSAPP_ADMIN = '542954321305';

    window.openConsulta = function(oid) {
      const o = c.ofertas.find(x => x.id === oid);
      if (!o) return;
      const off = pct(o.precioOriginal, o.precio);
      document.getElementById('cmHeader').innerHTML = `
        <div class="cm-thumb">
          ${o.imagen ? `<img src="${o.imagen}" alt="${o.titulo}"/>` : `<span>${RUBROS_ICONO[c.rubro]||'🏷️'}</span>`}
        </div>
        <div class="cm-prod">
          <div class="cm-prod-name">${o.titulo}</div>
          <div class="cm-prod-prices">
            <span class="cm-prod-price" style="color:${c.color}">${fmt(o.precio)}</span>
            <span class="cm-prod-orig">${fmt(o.precioOriginal)}</span>
            <span class="cm-prod-off">${off}% OFF</span>
          </div>
        </div>
        <button class="cm-close-btn" onclick="document.getElementById('ovConsulta').classList.remove('open')">✕</button>`;
      document.getElementById('cmBotMsg').textContent =
        `¡Hola! Vi que te interesa "${o.titulo}". Dejame tu nombre y WhatsApp y te conecto con ${c.nombre} para que arreglen la compra. 😊`;
      document.getElementById('cOid').value = oid;
      document.getElementById('cNombre').value = '';
      document.getElementById('cTelefono').value = '';
      document.getElementById('cMensaje').value = '';
      document.getElementById('frmConsulta').style.display = 'block';
      document.getElementById('cmSuccess').style.display = 'none';
      document.getElementById('ovConsulta').classList.add('open');
    };

    window.closeConsulta = function(e) {
      if (e && e.target !== document.getElementById('ovConsulta')) return;
      document.getElementById('ovConsulta').classList.remove('open');
    };

    window.enviarConsulta = function(e) {
      e.preventDefault();
      const oid    = parseInt(document.getElementById('cOid').value);
      const o      = c.ofertas.find(x => x.id === oid);
      const nombre = document.getElementById('cNombre').value.trim();
      const tel    = document.getElementById('cTelefono').value.trim();
      const msg    = document.getElementById('cMensaje').value.trim();
      const msgAdmin =
        `🛒 *Nueva consulta — OfertasLocales*\n\n` +
        `👤 *Cliente:* ${nombre}\n` +
        `📱 *Teléfono:* ${tel}\n` +
        `🏷️ *Producto:* ${o.titulo}\n` +
        `💰 *Precio oferta:* ${fmt(o.precio)} (${pct(o.precioOriginal, o.precio)}% OFF)\n` +
        `🏪 *Comercio:* ${c.nombre}` +
        (msg ? `\n💬 *Consulta:* ${msg}` : '');
      window.open(`https://wa.me/${WHATSAPP_ADMIN}?text=${encodeURIComponent(msgAdmin)}`, '_blank');
      document.getElementById('frmConsulta').style.display = 'none';
      document.getElementById('cmSuccess').innerHTML = `
        <div class="cm-ok-ico">✅</div>
        <h3>¡Gracias, ${nombre}!</h3>
        <p>Tu consulta fue enviada. En breve un asesor de <strong>${c.nombre}</strong>
           se pondrá en contacto con vos al <strong>${tel}</strong>
           para coordinar la compra de la promoción.</p>
        <p class="cm-ok-sub">¡Gracias por elegirnos! 🙏</p>`;
      document.getElementById('cmSuccess').style.display = 'block';
    };

    renderOfertas();
  </script>
<!-- ══ MODAL CONSULTAR / COMPRAR ══ -->
<div class="consulta-overlay" id="ovConsulta" onclick="closeConsulta(event)">
  <div class="consulta-modal">
    <div class="cm-header" id="cmHeader"></div>
    <div class="cm-bot-row">
      <div class="cm-bot-avatar">🤖</div>
      <div class="cm-bot-bubble">
        <div class="cm-bot-name">Asistente OfertasLocales</div>
        <span id="cmBotMsg"></span>
      </div>
    </div>
    <form class="cm-form" id="frmConsulta" onsubmit="enviarConsulta(event)">
      <input type="hidden" id="cOid"/>
      <div class="cm-fr">
        <label>Tu nombre *</label>
        <input class="cm-fi" type="text" id="cNombre" placeholder="¿Cómo te llamás?" required maxlength="60"/>
      </div>
      <div class="cm-fr">
        <label>Tu WhatsApp *</label>
        <input class="cm-fi" type="tel" id="cTelefono" placeholder="Ej: 2954 123456" required maxlength="20"/>
      </div>
      <div class="cm-fr">
        <label>Tu consulta (opcional)</label>
        <textarea class="cm-ft" id="cMensaje" placeholder="¿Tenés alguna pregunta sobre el producto?" maxlength="300"></textarea>
      </div>
      <button class="cm-submit-btn" type="submit">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Enviar consulta por WhatsApp
      </button>
    </form>
    <div class="cm-success" id="cmSuccess" style="display:none"></div>
  </div>
</div>
</body>
</html>
